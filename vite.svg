<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="flameOuter" x1="0%" y1="100%" x2="20%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3000"/>
      <stop offset="50%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <linearGradient id="flameMid" x1="0%" y1="100%" x2="10%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFE066"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0f0f1a"/>

  <!-- Flame glow backdrop -->
  <ellipse cx="200" cy="210" rx="55" ry="70" fill="#FF6B35" opacity="0.08"/>

  <!-- Outer flame -->
  <g filter="url(#glow)">
    <path d="
      M 200 80
      C 192 95 178 108 172 125
      C 165 145 168 162 162 175
      C 155 190 145 195 143 210
      C 140 228 148 248 160 258
      C 155 245 154 230 158 220
      C 162 210 170 205 172 215
      C 168 225 170 240 178 248
      C 172 235 172 220 178 212
      C 182 205 188 205 188 215
      C 186 228 188 245 196 252
      C 192 238 192 222 198 215
      C 202 208 208 210 210 220
      C 208 232 210 248 218 255
      C 215 242 214 226 220 218
      C 225 210 232 212 234 222
      C 236 235 232 252 224 262
      C 235 252 242 238 242 222
      C 244 208 238 195 235 182
      C 232 168 235 155 230 142
      C 225 128 215 118 212 102
      C 210 118 212 132 208 142
      C 205 128 204 108 200 80
      Z
    " fill="url(#flameOuter)"/>

    <!-- Middle flame -->
    <path d="
      M 200 110
      C 195 125 188 138 186 152
      C 183 168 188 180 185 192
      C 182 205 175 210 175 222
      C 173 235 180 250 188 256
      C 185 243 184 230 190 222
      C 193 215 198 215 198 225
      C 197 238 200 250 205 256
      C 202 242 202 228 207 220
      C 210 213 216 215 217 225
      C 216 238 214 252 220 260
      C 222 246 220 230 225 220
      C 228 212 234 215 234 226
      C 233 235 228 248 220 258
      C 228 248 234 235 233 220
      C 232 206 225 196 224 182
      C 222 168 225 155 220 142
      C 216 158 215 172 210 182
      C 208 168 207 148 200 110
      Z
    " fill="url(#flameMid)" opacity="0.9"/>

    <!-- Inner bright core -->
    <path d="
      M 200 148
      C 196 160 193 172 193 184
      C 192 196 196 206 195 216
      C 193 228 188 236 190 246
      C 194 238 196 228 200 222
      C 202 215 206 215 207 224
      C 206 234 205 245 208 252
      C 209 240 208 228 212 220
      C 215 213 220 215 220 225
      C 219 235 216 246 218 254
      C 221 244 222 232 220 222
      C 218 212 215 205 215 195
      C 214 182 216 168 212 155
      C 210 168 209 180 206 190
      C 205 175 204 160 200 148
      Z
    " fill="url(#flameInner)" opacity="0.7"/>
  </g>

  <!-- B&B text -->
  <text
    x="200"
    y="318"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="-2"
    fill="#ffffff"
    text-anchor="middle"
  >B&amp;B</text>

  <!-- Divider line -->
  <line x1="130" y1="330" x2="270" y2="330" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="200"
    y="350"
    font-family="'Arial', sans-serif"
    font-size="10"
    letter-spacing="5"
    fill="#ffffff"
    opacity="0.3"
    text-anchor="middle"
  >BURN &amp; BUILD</text>

</svg>
